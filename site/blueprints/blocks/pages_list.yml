name: Liste de pages
wysiwyg: true
preview: fields
fields:
  titre:
    label: Titre
    type: text

  pages_liste:
    label: Projet·s à afficher {{page.template}}
    type: pages
    query: site.index.filterBy('intendedTemplate', 'project')
    multiple: true
    layout: cards

  link:
    label: Lien
    type: pages
    multiple: false
    query: site.index.filterBy('template', 'not in', ['tags', 'tag'])
    width: 1/2
  
  link_label:
    label: Texte du Lien
    type: text
    width: 1/2
