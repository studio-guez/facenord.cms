name: Cartes
wysiwyg: true
preview: fields
icon: grid
fields:
  titre:
    label: Titre
    type: text
  style:
    label: style
    type: select
    options:
      light: blanc
      color: de couleur
  cards:
    label: Cards
    type: structure
    fields:
      text:
        label: Text
        type: writer
        inline: true
        marks:
          - italic
      baseline:
        label: Baseline
        type: text
      tag:
        label: Tag correspondant
        type: tags
        max: 1
        options:
          type: query
          query: site.find('tags').children
          text: "{{page.title}}"
          value: "{{page.slug}}"
