name: Cartes
wysiwyg: true
preview: fields
icon: grid
fields:
  titre:
    label: Titre
    type: text
  style:
    label: Style
    type: select
    options:
      light: Blanc
      color: Couleur
    width: 1/2
  shuffle:
    label: Ordre des cartes aléatoire
    type: toggle
    text:
      - "non"
      - "oui"
    width: 1/2
  cards:
    label: Cartes
    type: structure
    fields:
      text:
        label: Texte
        type: writer
        inline: true
        marks:
          - italic
      baseline:
        label: Baseline
        type: text
      tag:
        label: Tag correspondant
        type: tags
        max: 1
        options:
          type: query
          query: site.find('tags').children
          text: "{{page.title}}"
          value: "{{page.slug}}"
