title: Project
options:
  preview: "https://facenord.max-esnee.com/projets/{{page.slug}}"

fields:
  caption:
    label: En bref
    type: writer
    inline: true
    marks:
      - italic
  image_cover:
    label: Image de couverture
    type: files
    uploads:
      accept: image/*
    max: 1
    min: 1
    required: true
    layout: cards
    image:
      back: black
    size: huge
    width: 1/2

  tags:
    label: Type de projet
    type: pages
    query: site.find('tags').children
    # options:
    #   type: query
    #   query: site.find('tags').children
    #   value: "{{ page.slug }}"
    #   text: "{{ page.title }}"
    # multiple: true
    width: 1/2


  intention:
    label: Intention
    type: list

  description:
    label: Description
    type: writer
    nodes:
      - paragraph
      - bulletList
      - orderedList
    marks:
      - bold
      - italic
      - link
  content:
    label: Contenu
    type: blocks
    fieldsets:
      - text
      - image
      - gallery
      - podcast
      - video
      - cards
      - article_heading
      - profiles
      - map
      - pages_list
      - divider
